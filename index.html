<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entomological Scientific Tools</title>

<style>
:root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #333;
    --accent: #2c7be5;
    --badge: #e1ecff;
}

body.dark {
    --bg: #1e1e1e;
    --card: #2a2a2a;
    --text: #f1f1f1;
    --badge: #3a3a3a;
}

body {
    font-family: Arial;
    margin: 0;
    background: var(--bg);
    color: var(--text);
}

body.site {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #2c3e50, #2c7be5);
    color: white;
    padding: 25px;
    text-align: center;
}

.controls {
    margin-top: 10px;
}

input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    width: 220px;
}

/* CHIPS */
#activeFilters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0 5px 0;
    justify-content: center;
}

.chip {
    background: var(--accent);
    color: white;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 0.8em;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
}

#resultCount {
    margin-top: 6px;
    font-size: 0.9em;
    opacity: 0.8;
}

/* MAIN */
main {
    flex: 1;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* CARD */
.tool {
    display: flex;
    gap: 18px;
    align-items: center;
    width: 100%;
    max-width: 860px;
    margin-bottom: 22px;
    padding: 18px;
    border-radius: 14px;
    background: var(--card);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.tool > div {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.tool img {
    width: 95px;
    height: 95px;
    object-fit: contain;
}

.badge {
    display: inline-block;
    background: var(--badge);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.75em;
    margin-right: 6px;
}

.badge.status-ok { background: #d4edda; color: #155724; }
.badge.status-soon { background: #fff3cd; color: #856404; }

.button-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
}

.download-btn,
.install-btn {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.85em;
    cursor: pointer;
    text-decoration: none;
    border: none;
}

.download-btn {
    background: var(--accent);
    color: white;
}

.install-btn {
    background: #6c757d;
    color: white;
}

/* FILTER PANEL */
.filter-panel {
    position: fixed;
    top: 0;
    right: -340px;
    width: 320px;
    height: 100%;
    background: var(--card);
    box-shadow: -2px 0 10px rgba(0,0,0,0.25);
    transition: 0.3s ease;
    z-index: 2000;
    padding: 20px;
}

.filter-panel.open { right: 0; }

.filter-header {
    display: flex;
    justify-content: space-between;
}
</style>
</head>

<body class="site">

<header>
<h1>Entomological Scientific Tools</h1>

<div class="controls">
<input id="search" placeholder="Filtrer...">
<button id="modeBtn" onclick="toggleDark()">🌙 Dark mode</button>
<button id="openFilters">⚙️ Filters</button>
</div>

<div id="activeFilters"></div>
<div id="resultCount"></div>
</header>

<main>

<div class="tool" data-lang="fr" data-platform="android" data-taxa="moustiques" data-category="identification">
<img src="images/logo_moustic_reunion.png">

<div>
<h2>Moustic Réunion</h2>

<div>
<span class="badge">Android</span>
<span class="badge">FR</span>
<span class="badge status-ok">Disponible</span>
</div>

<p>Clé dichotomique interactive des moustiques de La Réunion.</p>

<div class="button-group">
<a class="download-btn" href="https://raw.githubusercontent.com/fredlardeux/entomo_tools/main/files/moustic_reunion.apk">
⬇ Télécharger APK
</a>

<button class="install-btn" onclick="openModal('moustic_reunion')">
📲 Installation
</button>
</div>
</div>
</div>

</main>

<!-- FILTER PANEL -->
<div id="filterPanel" class="filter-panel">
<div class="filter-header">
<h3>Filters</h3>
<button id="closeFilters">✖</button>
</div>

<div class="filters">
<select id="filter-lang">
<option value="">Langue</option>
<option value="fr">FR</option>
<option value="en">EN</option>
</select>

<select id="filter-platform">
<option value="">Plateforme</option>
<option value="android">Android</option>
</select>

<select id="filter-taxa">
<option value="">Taxa</option>
<option value="moustiques">Moustiques</option>
</select>

<select id="filter-category">
<option value="">Catégorie</option>
<option value="identification">Identification</option>
</select>

<button id="resetFilters">Reset</button>
</div>
</div>

<!-- MODAL -->
<div id="overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:3000;"></div>

<div id="modal" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;z-index:3001;"></div>

<script>
function toggleDark(){
document.body.classList.toggle("dark");
}

/* MODAL FIX */
function openModal(id){
    const modal = document.getElementById("modal");
    const overlay = document.getElementById("overlay");

    modal.style.display = "block";
    overlay.style.display = "block";

    modal.innerHTML = `
        <h3>Installation</h3>
        <p>${id}</p>
        <iframe src="tutoriels/${id}.html"
                style="width:600px;height:400px;border:none;"></iframe>
        <button onclick="closeModal()">Fermer</button>
    `;
}

function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("overlay").style.display="none";
}

/* FILTER FIX */
function applyFilters(){

const search = document.getElementById("search").value.toLowerCase();
const lang = document.getElementById("filter-lang").value;
const platform = document.getElementById("filter-platform").value;
const taxa = document.getElementById("filter-taxa").value;
const cat = document.getElementById("filter-category").value;

let count = 0;

document.querySelectorAll(".tool").forEach(t => {

let text = t.innerText.toLowerCase();
let ok = true;

if(search && !text.includes(search)) ok = false;
if(lang && t.dataset.lang !== lang) ok = false;
if(platform && t.dataset.platform !== platform) ok = false;
if(taxa && t.dataset.taxa !== taxa) ok = false;
if(cat && t.dataset.category !== cat) ok = false;

t.style.display = ok ? "flex" : "none";

if(ok) count++;
});

updateChips(lang, platform, taxa, cat);
document.getElementById("resultCount").innerText = count + " outil(s)";
}

function updateChips(lang, platform, taxa, cat){
const c = document.getElementById("activeFilters");
c.innerHTML = "";

function chip(label,val,id){
if(!val) return;
let d = document.createElement("div");
d.className="chip";
d.innerHTML=label+" ✖";
d.onclick=()=>{document.getElementById(id).value="";applyFilters();}
c.appendChild(d);
}

chip("Lang: "+lang,lang,"filter-lang");
chip("Plat: "+platform,platform,"filter-platform");
chip("Taxa: "+taxa,taxa,"filter-taxa");
chip("Cat: "+cat,cat,"filter-category");
}

/* INIT SAFE */
window.addEventListener("DOMContentLoaded", () => {

document.getElementById("search").addEventListener("input", applyFilters);

document.querySelectorAll("select").forEach(s =>
s.addEventListener("change", applyFilters)
);

document.getElementById("resetFilters").onclick = () => {
document.querySelectorAll("select").forEach(s => s.value = "");
document.getElementById("search").value = "";
applyFilters();
};

applyFilters();
});

/* PANEL */
const panel=document.getElementById("filterPanel");

document.getElementById("openFilters").onclick=()=>panel.classList.add("open");
document.getElementById("closeFilters").onclick=()=>panel.classList.remove("open");

document.getElementById("overlay").onclick=closeModal;

</script>

</body>
</html>
