<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entomological Scientific Tools</title>

<style>
:root {
    --bg: #f4f6f9;
    --card: #ffffff;
    --text: #333;
    --accent: #2c7be5;
    --badge: #e1ecff;
}

body.dark {
    --bg: #1e1e1e;
    --card: #2a2a2a;
    --text: #f1f1f1;
    --badge: #3a3a3a;
}

body {
    font-family: Arial;
    margin: 0;
    background: var(--bg);
    color: var(--text);
}

body.site {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    background: linear-gradient(135deg, #2c3e50, #2c7be5);
    color: white;
    padding: 25px;
    text-align: center;
}

.controls {
    margin-top: 10px;
}

input {
    padding: 8px;
    border-radius: 6px;
    border: none;
    width: 220px;
}

#activeFilters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0;
    justify-content: center;
}

.chip {
    background: var(--accent);
    color: white;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 0.8em;
}

main {
    flex: 1;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.tool {
    display: flex;
    gap: 18px;
    width: 100%;
    max-width: 860px;
    margin-bottom: 22px;
    padding: 18px;
    border-radius: 14px;
    background: var(--card);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.tool > div {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.tool img {
    width: 95px;
    height: 95px;
    object-fit: contain;
}

.badge {
    display: inline-block;
    background: var(--badge);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.75em;
    margin-right: 6px;
}

.button-group {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.download-btn,
.install-btn {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.85em;
    cursor: pointer;
    border: none;
}

.download-btn {
    background: var(--accent);
    color: white;
}

.install-btn {
    background: #6c757d;
    color: white;
}

/* FILTER PANEL */
.filter-panel {
    position: fixed;
    top: 0;
    right: -360px;
    width: 340px;
    height: 100%;
    background: var(--card);
    box-shadow: -4px 0 20px rgba(0,0,0,0.25);
    transition: 0.3s ease;
    z-index: 2000;
    padding: 20px;
}

.filter-panel.open { right: 0; }

/* MODAL */
#overlay {
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    z-index:3000;
}

#modal {
    display:none;
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:10px;
    z-index:3001;
    max-width:600px;
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    padding: 20px;
    text-align: center;
}

footer img {
    width: 40px;
    vertical-align: middle;
    margin-right: 10px;
}

footer a {
    color: white;
    text-decoration: none;
}
</style>
</head>

<body class="site">

<header>
<h1>Entomological Scientific Tools</h1>

<div class="controls">
<input id="search" placeholder="Filtrer...">
<button onclick="toggleDark()">🌙 Dark mode</button>
<button id="openFilters">⚙️ Filters</button>
</div>

<div id="activeFilters"></div>
</header>

<main>

<!-- CARD -->
<div class="tool" data-lang="fr" data-platform="android" data-taxa="moustiques" data-category="identification">
<img src="images/logo_moustic_reunion.png">

<div>
<h2>Moustic Réunion</h2>

<div class="button-group">
<a class="download-btn" href="#">APK</a>
<button class="install-btn" onclick="openModal('moustic_reunion')">Installation</button>
</div>

</div>
</div>

</main>

<!-- MODAL -->
<div id="overlay" onclick="closeModal()"></div>
<div id="modal"></div>

<script>

/* DARK MODE */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* =========================
   JSON INSTALL RENDERER
========================= */

function openModal(id){

const modal = document.getElementById("modal");
const overlay = document.getElementById("overlay");

modal.style.display = "block";
overlay.style.display = "block";

fetch("tutoriels/" + id + ".json")
.then(r => r.json())
.then(data => {

let html = `<h2>${data.title}</h2><ol>`;

if(data.steps){
data.steps.forEach(step => {
html += `<li>${step}</li>`;
});
}

html += `</ol><button onclick="closeModal()">Fermer</button>`;

modal.innerHTML = html;
})
.catch(err => {
modal.innerHTML = `
<h3>Erreur</h3>
<p>Fichier introuvable : ${id}.json</p>
<button onclick="closeModal()">Fermer</button>
`;
});

}

function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("overlay").style.display="none";
}

</script>

<footer>
<img src="images/Logo-github_entomotools.png">
<a href="https://github.com/" target="_blank">
GitHub repository
</a>
<p>© 2026 - FLX - Epidemiological entomology</p>
</footer>

</body>
</html>
